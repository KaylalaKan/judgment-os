<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mental Garden</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sky-top: #3a7fc1;
  --sky-mid: #6aaee0;
  --sky-low: #a8d4f0;
  --paper: #ffffff;
  --snow: #f9f9f9;
  --cloud: #f0f4f8;
  --mist: #d0dde8;
  --fog: #b0c4d8;
  --ash: #8aa0b4;
  --slate: #5a7080;
  --charcoal: #1a2530;
  --fern: #448f52;
  --mint: #dbeddf;
  --shadow-card: rgba(30,60,90,0.12) 0px 8px 24px -4px, rgba(30,60,90,0.07) 0px 2px 8px -2px;
  --shadow-hover: rgba(30,60,90,0.18) 0px 16px 36px -6px, rgba(30,60,90,0.1) 0px 4px 12px -3px;
  --r-card: 20px;
  --r-btn: 9999px;
  --r-input: 20px;
  --font-serif: 'Instrument Serif', Georgia, serif;
  --font-ui: 'Inter', system-ui, sans-serif;
}

html { scroll-behavior: smooth; background-color: #2d6aad; }

body {
  min-height: 100vh;
  background: transparent;
  color: var(--charcoal);
  font-family: var(--font-ui);
  font-size: 14px;
  line-height: 1.56;
  letter-spacing: 0.02em;
  overflow-x: hidden;
}

/* ── FIXED BACKGROUND (no backdrop-filter conflict) ── */
#bg {
  position: fixed; inset: 0; z-index: -1;
  background: linear-gradient(175deg, #2d6aad 0%, #4a90d9 20%, #6aaee0 45%, #a8d4f0 70%, #d8ecf8 88%, #eef6fc 100%);
}

/* ── SCROLL WARM OVERLAY (fixed, behind scene) ── */
#scroll-warm {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background: linear-gradient(175deg, rgba(180,100,120,0) 0%, rgba(200,120,80,0) 40%, rgba(220,160,100,0) 100%);
  transition: opacity 0.3s;
  opacity: 0;
}

/* ── SCENE LAYER (fixed, behind everything) ── */
#scene {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  overflow: hidden;
}

/* Sun / glow */
.sun-glow {
  position: absolute;
  top: -80px; right: -80px;
  width: 320px; height: 320px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,230,100,0.55) 0%, rgba(255,200,60,0.25) 35%, rgba(255,180,40,0.08) 60%, transparent 75%);
  animation: sunPulse 6s ease-in-out infinite;
  will-change: transform, opacity;
}
@keyframes sunPulse {
  0%,100% { transform: scale(1); opacity: 1; }
  50%      { transform: scale(1.06); opacity: 0.85; }
}

/* Light rays */
.sun-rays {
  position: absolute;
  top: -40px; right: -40px;
  width: 400px; height: 400px;
  background: conic-gradient(
    from 200deg,
    transparent 0deg, rgba(255,230,120,0.07) 3deg, transparent 6deg,
    transparent 12deg, rgba(255,230,120,0.06) 15deg, transparent 18deg,
    transparent 24deg, rgba(255,230,120,0.05) 27deg, transparent 30deg,
    transparent 0deg
  );
  animation: raysRotate 20s linear infinite;
  will-change: transform;
}
@keyframes raysRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* Cherry tree — left */
.tree-left {
  position: absolute;
  bottom: 0; left: -20px;
  width: 440px; height: 620px;
  transform-origin: bottom left;
}
/* Cherry tree — right */
.tree-right {
  position: absolute;
  bottom: 0; right: -20px;
  width: 380px; height: 560px;
  transform-origin: bottom right;
}

/* ── PETALS ── */
#petals {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 2;
  overflow: hidden;
}
.petal {
  position: absolute;
  top: -20px;
  will-change: transform;
  animation: petalFall linear infinite;
}
/* petal shape — 5-lobe cherry blossom */
.petal svg { display: block; }

@keyframes petalFall {
  0%   { transform: translateY(-24px) translateX(0px) rotate(0deg); opacity: 0; }
  5%   { opacity: 0.85; }
  30%  { transform: translateY(30vh) translateX(32px) rotate(240deg); }
  55%  { transform: translateY(58vh) translateX(-20px) rotate(450deg); }
  80%  { transform: translateY(84vh) translateX(28px) rotate(640deg); }
  95%  { opacity: 0.5; }
  100% { transform: translateY(112vh) translateX(6px) rotate(800deg); opacity: 0; }
}

/* ── NAV ── */
.nav-wrap {
  position: sticky; top: 14px; z-index: 100;
  display: flex; justify-content: center;
  padding: 0 20px;
  pointer-events: none;
}
.nav {
  pointer-events: all;
  display: flex; align-items: center; gap: 20px;
  background: rgba(255,255,255,0.72);
  backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.9);
  border-radius: var(--r-btn);
  padding: 10px 20px;
  box-shadow: rgba(30,60,90,0.15) 0px 8px 24px -4px, rgba(255,255,255,0.6) 0px 1px 0px inset;
  width: 100%; max-width: 820px;
}
.wordmark {
  font-family: var(--font-serif); font-style: italic;
  font-size: 18px; color: var(--charcoal);
  white-space: nowrap; text-decoration: none;
  letter-spacing: normal; flex-shrink: 0;
}
.wordmark em { color: var(--fern); font-style: italic; }

.nav-filters { display: flex; align-items: center; gap: 3px; flex: 1; }
.domain-pill {
  padding: 4px 12px; border-radius: var(--r-btn);
  font-size: 13px; font-weight: 400;
  color: var(--slate); background: transparent;
  border: 1px solid transparent;
  cursor: pointer; transition: all 0.15s;
  white-space: nowrap; letter-spacing: 0.02em;
}
.domain-pill:hover { background: rgba(74,144,193,0.1); color: var(--charcoal); }
.domain-pill.active { background: var(--charcoal); color: var(--paper); border-color: var(--charcoal); }

.nav-right { display: flex; align-items: center; gap: 10px; margin-left: auto; }
.search-wrap { position: relative; }
.search-input {
  padding: 6px 14px 6px 30px;
  background: rgba(168,212,240,0.2); border: 1px solid rgba(168,212,240,0.5);
  border-radius: var(--r-input); font-size: 13px; font-family: var(--font-ui);
  color: var(--charcoal); outline: none; width: 150px;
  transition: width 0.2s, background 0.15s; letter-spacing: 0.02em;
}
.search-input::placeholder { color: var(--ash); }
.search-input:focus { width: 190px; background: rgba(255,255,255,0.8); border-color: var(--fog); }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--ash); font-size: 11px; pointer-events: none; }
.count-badge { font-size: 12px; color: var(--ash); white-space: nowrap; }
.add-btn {
  padding: 7px 16px; background: var(--charcoal); color: var(--paper);
  border: none; border-radius: var(--r-btn);
  font-size: 13px; font-weight: 500; font-family: var(--font-ui);
  cursor: pointer; white-space: nowrap; letter-spacing: 0.02em;
  transition: opacity 0.15s; flex-shrink: 0;
}
.add-btn:hover { opacity: 0.8; }

/* ── LAYOUT ── */
.layout { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 36px 20px 100px; }

/* Scroll fade-in for sections */
.section, .radar {
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.55s ease, transform 0.55s ease;
}
.section.visible, .radar.visible {
  opacity: 1;
  transform: translateY(0);
}

/* ── RADAR ── */
.radar {
  margin-bottom: 44px; padding: 20px 22px;
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.95);
  border-radius: var(--r-card);
  box-shadow: var(--shadow-card);
}
.radar-head { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.radar-label { font-size: 11px; font-weight: 600; color: var(--ash); text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; }
.shimmer-line {
  flex: 1; height: 1px;
  background: linear-gradient(90deg, rgba(168,212,240,0.3) 0%, rgba(168,212,240,0.3) 25%, #6aaee0 40%, #f9a8c9 50%, rgba(168,212,240,0.3) 60%, rgba(168,212,240,0.3) 100%);
  background-size: 300% 100%;
  animation: shimmer 4s linear infinite;
}
@keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }

.radar-chips { display: flex; gap: 8px; flex-wrap: wrap; }
.radar-chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 14px; background: rgba(255,255,255,0.8);
  border: 1px solid rgba(168,212,240,0.5); border-radius: var(--r-btn);
  font-size: 12px; color: var(--slate); cursor: pointer;
  transition: all 0.15s; letter-spacing: 0.02em;
  backdrop-filter: blur(4px);
}
.radar-chip:hover { background: var(--paper); border-color: var(--fog); color: var(--charcoal); box-shadow: var(--shadow-card); }
.radar-chip-dot { width: 6px; height: 6px; border-radius: 50%; background: #f9a8c9; flex-shrink: 0; }

/* ── SECTION ── */
.section { margin-bottom: 36px; }
.section-head { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.section-title {
  font-family: var(--font-serif); font-style: italic;
  font-size: 18px; color: var(--paper); letter-spacing: normal;
  text-shadow: 0 1px 4px rgba(30,60,90,0.25);
}
.section-count { font-size: 12px; color: rgba(255,255,255,0.7); }
.section-line { flex: 1; height: 1px; background: rgba(255,255,255,0.3); }

/* ── CARD GRID ── */
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }

/* ── NODE CARD ── */
.node-card {
  background: rgba(255,255,255,0.92);
  border: 1px solid rgba(255,255,255,0.98);
  border-radius: var(--r-card);
  box-shadow: var(--shadow-card);
  padding: 16px 16px 13px;
  min-height: 164px;
  display: flex; flex-direction: column;
  cursor: pointer;
  transition: transform 0.18s, box-shadow 0.18s, opacity 0.5s, translate 0.5s;
  position: relative; overflow: hidden;
  backdrop-filter: blur(6px);
  opacity: 0;
  translate: 0 16px;
}
.node-card.visible {
  opacity: 1;
  translate: 0 0;
}
.node-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); }
.node-card.can-film::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, #f9a8c9 40%, var(--fern) 60%, transparent);
  opacity: 0.7;
}

.card-domain {
  font-size: 10px; font-weight: 500; color: var(--ash);
  text-transform: uppercase; letter-spacing: 0.07em;
  margin-bottom: 9px; display: flex; align-items: center; gap: 4px;
}
.card-domain-dot { width: 4px; height: 4px; border-radius: 50%; background: #7bbce0; }

.card-trigger {
  font-size: 13px; line-height: 1.6; color: var(--charcoal); flex: 1;
  display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; overflow: hidden;
}

.card-footer {
  margin-top: 12px; padding-top: 9px;
  border-top: 1px solid rgba(168,212,240,0.25);
  display: flex; align-items: center; justify-content: space-between;
}
.c-dots { display: flex; gap: 3px; }
.c-dot {
  width: 18px; height: 18px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 600;
  background: rgba(168,212,240,0.15); color: var(--ash);
  border: 1px solid rgba(168,212,240,0.3); transition: all 0.15s;
}
.c-dot.has { background: rgba(68,143,82,0.12); color: var(--fern); border-color: rgba(68,143,82,0.3); }

.card-right { display: flex; align-items: center; gap: 5px; }
.motif-badge { font-size: 10px; color: var(--ash); }
.motif-badge.has { color: var(--fern); }
.film-badge { font-size: 10px; color: #f9a8c9; }
.card-date { font-size: 10px; color: var(--ash); }

/* ── DETAIL OVERLAY ── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(20,40,60,0.45); backdrop-filter: blur(8px);
  z-index: 200; align-items: center; justify-content: center; padding: 20px;
}
.overlay.open { display: flex; }
.detail {
  background: rgba(255,255,255,0.97); border-radius: var(--r-card);
  width: 100%; max-width: 520px; max-height: 88vh; overflow-y: auto;
  box-shadow: rgba(30,60,90,0.2) 0px 24px 56px -8px;
  border: 1px solid rgba(255,255,255,0.98);
}
.detail-close-row { padding: 14px 18px 0; display: flex; justify-content: flex-end; }
.detail-close {
  width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
  background: var(--cloud); border: none; border-radius: 50%;
  cursor: pointer; font-size: 12px; color: var(--slate); transition: background 0.15s;
}
.detail-close:hover { background: var(--mist); }
.detail-head { padding: 4px 20px 0; }
.detail-badges { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.badge {
  padding: 3px 10px; border-radius: var(--r-btn);
  font-size: 11px; font-weight: 500; letter-spacing: 0.02em;
  border: 1px solid var(--mist); color: var(--slate); background: var(--snow);
}
.badge.domain { background: rgba(74,144,193,0.1); color: var(--sky-top); border-color: rgba(74,144,193,0.25); }
.badge.film { color: #d47a94; background: rgba(249,168,201,0.1); border-color: rgba(249,168,201,0.4); }
.badge.motif { font-size: 10px; }
.detail-trigger { font-size: 15px; font-weight: 500; line-height: 1.5; color: var(--charcoal); margin-bottom: 4px; }
.detail-date { font-size: 11px; color: var(--ash); margin-bottom: 2px; }
.detail-body { padding: 14px 20px 20px; }
.detail-section { margin-bottom: 16px; }
.detail-section:last-child { margin-bottom: 0; }
.detail-label {
  font-size: 10px; font-weight: 600; color: var(--ash);
  text-transform: uppercase; letter-spacing: 0.08em;
  margin-bottom: 6px; display: flex; align-items: center; gap: 5px;
}
.detail-text { font-size: 13px; line-height: 1.65; color: var(--charcoal); }
.detail-text.judgment { font-size: 14px; font-weight: 500; }
.ai-block {
  margin-top: 8px; padding: 9px 12px;
  background: var(--snow); border: 1px solid var(--mist); border-left: 2px solid var(--fog);
  border-radius: 0 8px 8px 0; font-size: 12px; line-height: 1.6; color: var(--slate);
}
.ai-tag {
  display: inline-block; font-size: 9px; font-weight: 600;
  background: var(--cloud); color: var(--ash); border-radius: 4px;
  padding: 1px 5px; margin-right: 4px; vertical-align: middle; letter-spacing: 0.03em;
}
.method-user {
  padding: 10px 12px; background: var(--mint); border-radius: 8px;
  font-size: 13px; line-height: 1.6; border: 1px solid #c2e0c8; margin-bottom: 6px;
}
.method-ai {
  padding: 9px 12px; background: var(--snow); border: 1px solid var(--mist);
  border-left: 2px solid var(--fog); border-radius: 0 8px 8px 0;
  font-size: 12px; line-height: 1.6; color: var(--slate); margin-top: 6px;
}
.detail-completeness {
  display: flex; gap: 16px; padding-top: 12px; margin-top: 4px;
  border-top: 1px solid var(--cloud);
}
.dc-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--ash); }
.dc-item.has { color: var(--fern); }
.dc-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.7; }

/* ── ADD OVERLAY ── */
.add-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(20,40,60,0.45); backdrop-filter: blur(8px);
  z-index: 300; align-items: center; justify-content: center; padding: 20px;
}
.add-overlay.open { display: flex; }
.add-panel {
  background: rgba(255,255,255,0.97); border-radius: var(--r-card);
  width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto;
  box-shadow: rgba(30,60,90,0.2) 0px 24px 56px -8px; border: 1px solid rgba(255,255,255,0.98);
}
.add-head { padding: 20px 22px 0; display: flex; align-items: center; justify-content: space-between; }
.add-title { font-family: var(--font-serif); font-style: italic; font-size: 18px; color: var(--charcoal); letter-spacing: normal; }
.add-close {
  width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
  background: var(--cloud); border: none; border-radius: 50%; cursor: pointer; font-size: 12px; color: var(--slate);
}
.add-body { padding: 16px 22px; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 10px; font-weight: 600; color: var(--ash); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 5px; }
.field textarea, .field input, .field select {
  width: 100%; padding: 9px 14px;
  background: rgba(168,212,240,0.08); border: 1px solid rgba(168,212,240,0.35);
  border-radius: var(--r-input); font-size: 13px; font-family: var(--font-ui);
  color: var(--charcoal); outline: none; resize: vertical; line-height: 1.55;
  transition: border-color 0.15s, background 0.15s; letter-spacing: 0.02em;
}
.field textarea:focus, .field input:focus, .field select:focus {
  border-color: rgba(74,144,193,0.5); background: var(--paper);
}
.field textarea { min-height: 64px; }
.field-hint { font-size: 10px; color: var(--ash); margin-top: 3px; }
.add-footer { padding: 0 22px 20px; display: flex; gap: 8px; justify-content: flex-end; }
.btn-ghost {
  padding: 8px 16px; background: transparent; border: 1px solid var(--mist);
  border-radius: var(--r-btn); font-size: 13px; font-family: var(--font-ui);
  cursor: pointer; color: var(--slate); transition: background 0.15s;
}
.btn-ghost:hover { background: var(--cloud); }
.btn-primary {
  padding: 8px 18px; background: var(--charcoal); color: var(--paper);
  border: none; border-radius: var(--r-btn);
  font-size: 13px; font-weight: 500; font-family: var(--font-ui);
  cursor: pointer; transition: opacity 0.15s;
}
.btn-primary:hover { opacity: 0.8; }

/* ── STATES ── */
.empty { grid-column: 1/-1; text-align: center; padding: 48px 0; color: rgba(255,255,255,0.7); font-size: 13px; }
.welcome {
  grid-column: 1/-1; text-align: center; padding: 60px 32px;
  background: rgba(255,255,255,0.88); border: 1px solid rgba(255,255,255,0.95);
  border-radius: var(--r-card); box-shadow: var(--shadow-card); backdrop-filter: blur(8px);
}
.welcome-logo { font-family: var(--font-serif); font-style: italic; font-size: 30px; color: var(--charcoal); margin-bottom: 10px; }
.welcome-logo em { color: var(--fern); }
.welcome p { color: var(--slate); font-size: 13px; line-height: 1.7; max-width: 300px; margin: 0 auto; }
</style>
</head>
<body>

<!-- Scene: trees + sun (fixed behind content) -->
<div id="bg"></div>
<div id="scroll-warm"></div>
<div id="scene">
  <div class="sun-glow"></div>
  <div class="sun-rays"></div>

  <!-- Left cherry tree -->
  <svg class="tree-left" viewBox="0 0 440 620" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMinYMax meet">
    <defs>
      <filter id="bl-soft" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="11"/></filter>
      <filter id="bl-mid"  x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="6"/></filter>
      <filter id="bl-crisp" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="3"/></filter>
    </defs>
    <!-- base blossom cloud – very soft, large -->
    <g filter="url(#bl-soft)" opacity="0.88">
      <ellipse cx="180" cy="230" rx="170" ry="140" fill="#ffb7c5"/>
      <ellipse cx="80"  cy="200" rx="120" ry="100" fill="#ffc8d5"/>
      <ellipse cx="290" cy="210" rx="130" ry="110" fill="#ffafc0"/>
      <ellipse cx="150" cy="140" rx="140" ry="100" fill="#ffbfcf"/>
      <ellipse cx="240" cy="160" rx="110" ry="90"  fill="#ffc4d2"/>
      <ellipse cx="50"  cy="240" rx="90"  ry="80"  fill="#ffd0de"/>
      <ellipse cx="350" cy="220" rx="100" ry="85"  fill="#ffb2c4"/>
      <ellipse cx="180" cy="100" rx="110" ry="75"  fill="#ffccd8"/>
      <ellipse cx="380" cy="160" rx="80"  ry="70"  fill="#ffbac8"/>
    </g>
    <!-- mid layer – depth and density -->
    <g filter="url(#bl-mid)" opacity="0.65">
      <ellipse cx="150" cy="200" rx="110" ry="90"  fill="#f598b0"/>
      <ellipse cx="250" cy="185" rx="100" ry="82"  fill="#f590a8"/>
      <ellipse cx="90"  cy="175" rx="85"  ry="70"  fill="#f8a8be"/>
      <ellipse cx="310" cy="195" rx="90"  ry="75"  fill="#f498b2"/>
      <ellipse cx="180" cy="120" rx="95"  ry="65"  fill="#f8b0c5"/>
    </g>
    <!-- light highlight puffs on top -->
    <g filter="url(#bl-crisp)" opacity="0.55">
      <ellipse cx="130" cy="160" rx="60" ry="48" fill="#ffe0ea"/>

<!-- Petals -->
<div id="petals"></div>

<div class="nav-wrap">
  <nav class="nav">

      <button class="domain-pill" data-domain="表达">表达</button>
      <button class="domain-pill" data-domain="AI">AI</button>
      <button class="domain-pill" data-domain="学习">学习</button>
    </div>
    <div class="nav-right">
      <div class="search-wrap">
        <span class="search-icon">○</span>
        <input type="text" class="search-input" id="searchInput" placeholder="搜索…">

<div class="layout" id="app">
  <div style="color:rgba(255,255,255,0.6);font-size:13px;">加载中…</div>

<div class="overlay" id="detailOverlay" onclick="handleOverlayClick(event)">
  <div class="detail" id="detailPanel"></div>
</div>

<div class="add-overlay" id="addOverlay">
  <div class="add-panel">
    <div class="add-head">
      <div class="add-title">记录一个触动</div>
      <button class="add-close" onclick="closeAdd()">✕</button>
    </div>
    <div class="add-body">
      <div class="field"><label>触动 *</label><textarea id="f-trigger" placeholder="让你停下来的那句话、那件事…" rows="3"></textarea></div>
      <div class="field">
        <label>领域</label>
        <select id="f-domain">
          <option value="">选择领域…</option>
          <option value="个人成长">个人成长</option>
          <option value="表达">表达</option>
          <option value="AI">AI</option>
          <option value="学习">学习</option>
        </select>
      </div>
      <div class="field"><label>案例</label><textarea id="f-case" placeholder="谁做了什么，发生了什么…"></textarea></div>
      <div class="field"><label>判断</label><textarea id="f-judgment" placeholder="你从中得出了什么？"></textarea></div>
      <div class="field"><label>方法</label><textarea id="f-method" placeholder="下次怎么用？"></textarea></div>
      <div class="field">
        <label>主题标签</label>
        <input type="text" id="f-themes" placeholder="老板演讲、AI应用…">
        <div class="field-hint">逗号分隔</div>
      </div>
    </div>
    <div class="add-footer">
      <button class="btn-ghost" onclick="closeAdd()">取消</button>
      <button class="btn-primary" onclick="saveNode()">存入花园</button>
    </div>
  </div>
</div>

<script>
let allNodes = [], activeDomain = '', searchQuery = '';

// ── Petals (SVG cherry blossom shape) ──
function petalSVG(size, color) {
  // 5-petal cherry blossom
  const r = size / 2;
  const pr = r * 0.55; // petal radius
  const petals = [];
  for (let i = 0; i < 5; i++) {
    const angle = (i * 72 - 90) * Math.PI / 180;
    const cx = r + Math.cos(angle) * pr * 0.7;
    const cy = r + Math.sin(angle) * pr * 0.7;
    petals.push(`<ellipse cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" rx="${(pr*0.75).toFixed(1)}" ry="${(pr*0.5).toFixed(1)}" transform="rotate(${i*72 - 90} ${cx.toFixed(1)} ${cy.toFixed(1)})" fill="${color}" opacity="0.82"/>`);
  }
  // center dot
  petals.push(`<circle cx="${r}" cy="${r}" r="${(r*0.18).toFixed(1)}" fill="rgba(255,210,100,0.9)"/>`);
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">${petals.join('')}</svg>`;
}

function initPetals() {
  const container = document.getElementById('petals');
  const colors = [
    'rgba(255,182,193,0.88)',
    'rgba(255,160,180,0.82)',
    'rgba(255,200,210,0.85)',
    'rgba(250,170,185,0.8)',
  ];
  for (let i = 0; i < 16; i++) {
    const wrap = document.createElement('div');
    wrap.className = 'petal';
    const size = 12 + Math.floor(Math.random() * 10);
    const color = colors[i % colors.length];
    wrap.innerHTML = petalSVG(size, color);
    wrap.style.cssText = [
      `left:${(Math.random() * 96).toFixed(1)}%`,
      `animation-duration:${(10 + Math.random() * 10).toFixed(1)}s`,
      `animation-delay:${(-Math.random() * 16).toFixed(1)}s`,
      `transform:rotate(${Math.floor(Math.random()*360)}deg)`,
    ].join(';');
    container.appendChild(wrap);
  }
}

// ── Scroll parallax + fade-in ──
function initScroll() {
  // Parallax for trees (subtle)
  const treeLeft  = document.querySelector('.tree-left');
  const treeRight = document.querySelector('.tree-right');

  // IntersectionObserver for fade-in
  const fadeObs = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
        // stagger cards within a section
        if (e.target.classList.contains('section')) {
          const cards = e.target.querySelectorAll('.node-card');
          cards.forEach((c, i) => {
            setTimeout(() => c.classList.add('visible'), i * 60);
          });
        }
      }
    });
  }, { threshold: 0.08 });

  document.querySelectorAll('.radar, .section').forEach(el => fadeObs.observe(el));

  // Scroll listener for parallax + background warmth
  const warmOverlay = document.getElementById('scroll-warm');
  let ticking = false;
  window.addEventListener('scroll', () => {
    if (ticking) return;
    requestAnimationFrame(() => {
      const sy = window.scrollY;
      const maxScroll = document.body.scrollHeight - window.innerHeight;
      const progress = maxScroll > 0 ? Math.min(sy / maxScroll, 1) : 0;

      // Trees drift upward (parallax)
      if (treeLeft)  treeLeft.style.transform  = `translateY(${sy * 0.18}px)`;
      if (treeRight) treeRight.style.transform = `translateY(${sy * 0.12}px)`;

      // Background warm shift: overlay a dusk gradient that fades in as you scroll
      warmOverlay.style.background = `linear-gradient(175deg, rgba(160,80,120,${progress*0.22}) 0%, rgba(180,100,60,${progress*0.18}) 40%, rgba(200,140,80,${progress*0.12}) 100%)`;

      ticking = false;
    });
    ticking = true;
  }, { passive: true });
}

// ── Data ──
async function init() {
  initPetals();
  initScroll();
  try {
    const r = await fetch('data/nodes.json?t=' + Date.now());
    allNodes = (await r.json()).nodes || [];
  } catch(e) { allNodes = []; }
  document.getElementById('domainFilters').addEventListener('click', e => {
    const btn = e.target.closest('.domain-pill'); if (!btn) return;
    activeDomain = btn.dataset.domain;
    document.querySelectorAll('.domain-pill').forEach(b => b.classList.toggle('active', b===btn));
    render();
  });
  render();
}

function canFilm(n) { return n.judgment && (n.case || n.method || (n.method_ai && n.method_ai.length)); }
function hasPart(n,f) { return !!(n[f] && n[f].trim()); }

function filtered() {
  return allNodes.filter(n => {
    if (activeDomain && n.domain !== activeDomain) return false;
    if (searchQuery) {
      const t=[n.trigger,n.case,n.judgment,n.method,...(n.themes||[])].join(' ').toLowerCase();
      if (!searchQuery.toLowerCase().split(/\s+/).every(w=>t.includes(w))) return false;
    }
    return true;
  });
}

function render() {
  const app = document.getElementById('app');
  const nodes = filtered();
  document.getElementById('nodeCount').textContent = allNodes.length + ' 个';

  if (!allNodes.length) {
    app.innerHTML = `<div class="card-grid"><div class="welcome"><div class="welcome-logo">Mental <em>Garden</em></div><p>点右上角「记录」，把今天让你停下来的瞬间存进来。</p></div></div>`;
    return;
  }

  let html = '';
  const filmable = nodes.filter(canFilm);
  if (filmable.length) {
    html += `<div class="radar"><div class="radar-head"><span class="radar-label">可以拍了</span><div class="shimmer-line"></div></div><div class="radar-chips">`;
    filmable.forEach(n => { html += `<span class="radar-chip" onclick="openDetail('${n.id}')"><span class="radar-chip-dot"></span>${esc(short(n.trigger,20))}</span>`; });
    html += `</div></div>`;
  }

  const themeMap = {};
  nodes.forEach(n => {
    (n.themes && n.themes.length ? n.themes : ['其他']).forEach(t => { if (!themeMap[t]) themeMap[t]=[]; themeMap[t].push(n); });
  });

  if (!nodes.length) {
    html += `<div class="card-grid"><div class="empty">没有匹配的节点</div></div>`;
  } else {
    const rendered = new Set();
    Object.keys(themeMap).forEach(theme => {
      html += `<div class="section"><div class="section-head"><span class="section-title">${esc(theme)}</span><span class="section-count">${themeMap[theme].length}</span><div class="section-line"></div></div><div class="card-grid">`;
      themeMap[theme].forEach(n => { if (!rendered.has(n.id)) { html += cardHtml(n); rendered.add(n.id); } });
      html += `</div></div>`;
    });
  }
  app.innerHTML = html;

  // Re-observe newly rendered elements
  setTimeout(() => {
    const fadeObs = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          if (e.target.classList.contains('section')) {
            e.target.querySelectorAll('.node-card').forEach((c,i) => {
              setTimeout(() => c.classList.add('visible'), i * 55);
            });
          }
        }
      });
    }, { threshold: 0.08 });
    document.querySelectorAll('.radar, .section').forEach(el => fadeObs.observe(el));
  }, 0);
}

function cardHtml(n) {
  const film = canFilm(n);
  const hasJ=hasPart(n,'judgment'), hasC=hasPart(n,'case'), hasM=hasPart(n,'method')||(n.method_ai&&n.method_ai.length);
  const dots=[{l:'判',h:hasJ},{l:'案',h:hasC},{l:'方',h:hasM}].map(d=>`<span class="c-dot${d.h?' has':''}">${d.l}</span>`).join('');
  const motif = n.motif ? `<span class="motif-badge has">🌿</span>` : '';
  const filmBadge = film ? `<span class="film-badge">🌸</span>` : '';
  return `<div class="node-card${film?' can-film':''}" id="node-${n.id}" onclick="openDetail('${n.id}')">
    <div class="card-domain"><span class="card-domain-dot"></span>${esc(n.domain||'')}</div>
    <div class="card-trigger">${esc(n.trigger)}</div>
    <div class="card-footer"><div class="c-dots">${dots}</div><div class="card-right">${motif}${filmBadge}<span class="card-date">${((n.updatedAt||n.date)||'').slice(5)}</span></div></div>
  </div>`;
}

function openDetail(id) {
  const n = allNodes.find(x=>x.id===id); if (!n) return;
  const film=canFilm(n), hasJ=hasPart(n,'judgment'), hasC=hasPart(n,'case'), hasM=hasPart(n,'method');
  const hasCAI=!!(n.case_note&&n.case_note.trim()), hasMAI=n.method_ai&&n.method_ai.length;
  const domBadge=n.domain?`<span class="badge domain">${esc(n.domain)}</span>`:'';
  const motifBadge=n.motif?`<span class="badge motif">🌿 ${esc(short(n.motif,16))}</span>`:'';
  const filmBadge=film?`<span class="badge film">🌸 可以拍</span>`:'';
  let body='';
  if (hasC||hasCAI) {
    body+=`<div class="detail-section"><div class="detail-label">案例</div>`;
    if (hasC) body+=`<div class="detail-text">${esc(n.case)}</div>`;
    if (hasCAI) body+=`<div class="ai-block"><span class="ai-tag">AI 核实</span>${esc(n.case_note)}</div>`;
    body+=`</div>`;
  }
  if (hasJ) body+=`<div class="detail-section"><div class="detail-label">判断</div><div class="detail-text judgment">${esc(n.judgment)}</div></div>`;
  if (hasM||hasMAI) {
    body+=`<div class="detail-section"><div class="detail-label">方法</div>`;
    if (hasM) body+=`<div class="method-user">${esc(n.method)}</div>`;
    if (hasMAI) n.method_ai.forEach(m=>{body+=`<div class="method-ai"><span class="ai-tag">AI</span>${esc(m)}</div>`;});
    body+=`</div>`;
  }
  body+=`<div class="detail-completeness">
    <span class="dc-item${hasJ?' has':''}"><span class="dc-dot"></span>判断</span>
    <span class="dc-item${hasC?' has':''}"><span class="dc-dot"></span>案例</span>
    <span class="dc-item${(hasM||hasMAI)?' has':''}"><span class="dc-dot"></span>方法</span>
  </div>`;
  document.getElementById('detailPanel').innerHTML=`
    <div class="detail-close-row"><button class="detail-close" onclick="closeDetail()">✕</button></div>
    <div class="detail-head"><div class="detail-badges">${domBadge}${motifBadge}${filmBadge}</div><div class="detail-trigger">${esc(n.trigger)}</div><div class="detail-date">${n.updatedAt||n.date||''}</div></div>
    <div class="detail-body">${body}</div>`;
  document.getElementById('detailOverlay').classList.add('open');
}

function handleOverlayClick(e) { if(e.target===document.getElementById('detailOverlay')) closeDetail(); }
function closeDetail() { document.getElementById('detailOverlay').classList.remove('open'); }
function openAdd() { document.getElementById('addOverlay').classList.add('open'); document.getElementById('f-trigger').focus(); }
function closeAdd() {
  document.getElementById('addOverlay').classList.remove('open');
  ['f-trigger','f-case','f-judgment','f-method','f-themes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-domain').value='';
}
function saveNode() {
  const trigger=document.getElementById('f-trigger').value.trim();
  if (!trigger){alert('触动是必填的');return;}
  const themes=document.getElementById('f-themes').value.trim().split(/[,，]+/).map(t=>t.trim()).filter(Boolean);
  const today=new Date().toISOString().slice(0,10);
  const node={id:String(allNodes.length+1).padStart(3,'0'),date:today,trigger,
    case:document.getElementById('f-case').value.trim(),
    judgment:document.getElementById('f-judgment').value.trim(),
    method:document.getElementById('f-method').value.trim(),
    method_ai:[],themes,domain:document.getElementById('f-domain').value,
    motif:'',ai_reviewed:false,updatedAt:today};
  allNodes.unshift(node); closeAdd(); render();
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify({nodes:allNodes},null,2)],{type:'application/json'}));
  a.download='nodes.json'; a.click();
  setTimeout(()=>alert('nodes.json 已下载。替换 data/ 文件夹里的原文件，然后 git push。'),200);
}
document.getElementById('searchInput').addEventListener('input',function(){searchQuery=this.value;render();});

function esc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>');}
function short(s,n){return s&&s.length>n?s.slice(0,n)+'…':(s||'');}

init();
</script>
