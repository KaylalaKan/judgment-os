<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Judgment OS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #EEEAE3;
      --surface:  #FFFFFF;
      --border:   #E0DAD1;
      --tp:       #1A1714;
      --ts:       #6B6258;
      --tm:       #A49E97;
      --accent:   #2952CC;
      --al:       #EBF0FF;
      --radius:   14px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans SC", sans-serif;
      background: var(--bg);
      color: var(--tp);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── Header ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(238,234,227,.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 14px 32px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo-wrap { flex-shrink: 0; }

    .logo-eye {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--tm);
      line-height: 1;
      margin-bottom: 2px;
    }

    .logo-name {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -.3px;
      color: var(--tp);
    }

    .search {
      flex: 1;
      max-width: 320px;
      margin-left: auto;
    }

    .search input {
      width: 100%;
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      font-size: 13px;
      color: var(--tp);
      outline: none;
      transition: border-color .15s;
    }

    .search input::placeholder { color: var(--tm); }
    .search input:focus { border-color: var(--accent); }

    /* ── Grid ── */
    .grid-wrap {
      padding: 32px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .category-group { margin-bottom: 40px; }

    .category-label {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--tm);
      margin-bottom: 16px;
      padding-left: 2px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
      gap: 20px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: box-shadow .2s, transform .2s;
    }

    .card:hover {
      box-shadow: 0 8px 32px rgba(0,0,0,.08);
      transform: translateY(-1px);
    }

    .card-head {
      padding: 22px 22px 16px;
      border-bottom: 1px solid var(--border);
    }

    .card-top-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .card-num {
      font-size: 10px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: .06em;
    }

    .card-cat {
      font-size: 11px;
      font-weight: 600;
      color: var(--ts);
      background: #F0EDE7;
      padding: 2px 9px;
      border-radius: 20px;
    }

    .card-ver {
      margin-left: auto;
      font-size: 11px;
      color: var(--tm);
      background: #F7F5F1;
      border: 1px solid var(--border);
      padding: 2px 9px;
      border-radius: 20px;
    }

    .card-title {
      font-size: 20px;
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: -.3px;
      margin-bottom: 6px;
    }

    .card-sub {
      font-size: 13px;
      color: var(--ts);
      line-height: 1.55;
    }

    /* ── Tabs ── */
    .card-tabs {
      display: flex;
      gap: 6px;
      padding: 14px 22px;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      flex-wrap: wrap;
      row-gap: 6px;
    }

    .card-tabs::-webkit-scrollbar { display: none; }

    .ctab {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      color: var(--ts);
      cursor: pointer;
      border: 1px solid transparent;
      transition: all .15s;
      white-space: nowrap;
      background: #F2EFE9;
    }

    .ctab:hover { background: #E8E4DC; color: var(--tp); }

    .ctab.active {
      background: var(--al);
      color: var(--accent);
      border-color: #C5D3F5;
    }

    /* ── Content ── */
    .card-body {
      padding: 20px 22px 22px;
      flex: 1;
    }

    .panel { display: none; }
    .panel.active { display: block; }

    /* Theory */
    .sec { margin-bottom: 20px; }
    .sec:last-child { margin-bottom: 0; }

    .sec-lbl {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--tm);
      margin-bottom: 8px;
    }

    .sec-txt {
      font-size: 14px;
      line-height: 1.75;
      color: var(--tp);
      white-space: pre-wrap;
    }

    /* Evolution */
    .tl-item {
      display: flex;
      gap: 14px;
      margin-bottom: 2px;
    }

    .tl-left {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 38px;
      flex-shrink: 0;
    }

    .tl-dot {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #F2EFE9;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 800;
      color: var(--ts);
      flex-shrink: 0;
    }

    .tl-dot.cur {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .tl-spine {
      width: 2px;
      background: var(--border);
      flex: 1;
      min-height: 16px;
      margin: 3px 0;
    }

    .tl-right { flex: 1; padding-bottom: 20px; }

    .tl-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .tl-desc {
      font-size: 13px;
      color: var(--ts);
      line-height: 1.6;
      margin-bottom: 6px;
    }

    .tl-tag {
      display: inline-block;
      font-size: 12px;
      padding: 2px 9px;
      border-radius: 4px;
      line-height: 1.5;
    }

    .tl-tag.prob { background: #FFF3ED; color: #9A3412; }
    .tl-tag.win  { background: #F0FDF4; color: #15803D; }

    /* Rules */
    .rule-item {
      padding: 14px 16px;
      background: #F9F7F4;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .rule-item:last-child { margin-bottom: 0; }

    .rule-name {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 5px;
    }

    .rule-body { font-size: 13px; color: var(--ts); line-height: 1.65; }

    /* Quotes */
    .quote-item {
      border-left: 3px solid var(--accent);
      background: var(--al);
      padding: 11px 14px;
      border-radius: 0 6px 6px 0;
      font-size: 14px;
      line-height: 1.65;
      color: var(--tp);
      margin-bottom: 10px;
    }

    .quote-item:last-child { margin-bottom: 0; }

    /* Agenda */
    .agenda-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 10px 13px;
      background: #F9F7F4;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      color: var(--ts);
      line-height: 1.55;
      margin-bottom: 8px;
    }

    .agenda-item:last-child { margin-bottom: 0; }

    .agenda-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--tm);
      flex-shrink: 0;
      margin-top: 7px;
    }

    /* Empty */
    .empty {
      padding: 24px;
      text-align: center;
      font-size: 13px;
      color: var(--tm);
      border: 1px dashed var(--border);
      border-radius: 8px;
    }

    /* Card footer */
    .card-foot {
      padding: 10px 22px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--tm);
    }

    /* Mobile */
    @media (max-width: 600px) {
      .header { padding: 12px 16px; }
      .grid-wrap { padding: 16px; }
      .card-grid { grid-template-columns: 1fr; gap: 14px; }
      .card-head { padding: 16px 16px 12px; }
      .card-tabs { padding: 10px 16px; }
      .card-body { padding: 16px 16px 18px; }
      .card-title { font-size: 17px; }
      .search { max-width: 180px; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="logo-wrap">
    <div class="logo-eye">Research System</div>
    <div class="logo-name">Judgment OS</div>
  </div>
  <div class="search">
    <input type="text" id="searchInput" placeholder="搜索议题…" oninput="filterCards(this.value)">
  </div>
</header>

<div class="grid-wrap" id="gridWrap"></div>

<script>
  const TABS = [
    { id: 'theory',    label: '当前理论' },
    { id: 'evolution', label: '来时路'   },
    { id: 'rules',     label: '规则'     },
    { id: 'quotes',    label: '金句'     },
    { id: 'agenda',    label: '研究议程' },
    { id: 'cases',     label: '案例'     },
    { id: 'methods',   label: '方法'     },
  ];

  let allCards = [];
  const activeTab = {}; // cardId → tabId

  async function init() {
    try {
      const r = await fetch('data/cards.json');
      const d = await r.json();
      allCards = d.cards || [];
      allCards.forEach(c => activeTab[c.id] = 'theory');
      render(allCards);
    } catch(e) {
      document.getElementById('gridWrap').innerHTML =
        '<p style="color:#A49E97;padding:40px">无法加载数据</p>';
    }
  }

  function filterCards(q) {
    const s = q.toLowerCase();
    render(s ? allCards.filter(c =>
      c.title.toLowerCase().includes(s) ||
      c.subtitle.toLowerCase().includes(s) ||
      (c.currentTheory || '').toLowerCase().includes(s)
    ) : allCards);
  }

  function render(list) {
    const wrap = document.getElementById('gridWrap');
    const groups = {};
    list.forEach(c => {
      const g = c.category || '未分类';
      (groups[g] = groups[g] || []).push(c);
    });

    wrap.innerHTML = Object.entries(groups).map(([g, cards]) => `
      <div class="category-group">
        <div class="category-label">${g}</div>
        <div class="card-grid">
          ${cards.map(buildCard).join('')}
        </div>
      </div>
    `).join('');
  }

  function buildCard(c) {
    const at = activeTab[c.id] || 'theory';
    return `
      <div class="card" id="card-${c.id}">
        <div class="card-head">
          <div class="card-top-row">
            <span class="card-num">#${c.id}</span>
            <span class="card-cat">${c.category || '未分类'}</span>
            <span class="card-ver">${c.currentVersion || 'V1'}</span>
          </div>
          <div class="card-title">${c.title}</div>
          <div class="card-sub">${c.subtitle}</div>
        </div>
        <div class="card-tabs">
          ${TABS.map(t => `
            <div class="ctab ${t.id === at ? 'active' : ''}"
                 onclick="switchTab('${c.id}','${t.id}',this)">${t.label}</div>
          `).join('')}
        </div>
        <div class="card-body">
          ${TABS.map(t => `
            <div class="panel ${t.id === at ? 'active' : ''}" id="p-${c.id}-${t.id}">
              ${buildContent(t.id, c)}
            </div>
          `).join('')}
        </div>
        <div class="card-foot">更新于 ${c.updatedAt || '—'}</div>
      </div>
    `;
  }

  function switchTab(cardId, tabId) {
    activeTab[cardId] = tabId;
    const card = document.getElementById('card-' + cardId);
    card.querySelectorAll('.ctab').forEach(t => t.classList.remove('active'));
    card.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    event.target.classList.add('active');
    card.querySelector('#p-' + cardId + '-' + tabId).classList.add('active');
  }

  function nl(s) { return s ? s.replace(/\n/g, '<br>') : ''; }
  function empty(msg) { return `<div class="empty">${msg || '暂无内容'}</div>`; }

  function buildContent(tab, c) {
    switch(tab) {
      case 'theory':
        if (!c.why && !c.currentTheory) return empty('尚未建立理论');
        return `
          ${c.why ? `<div class="sec"><div class="sec-lbl">为什么值得研究</div><div class="sec-txt">${nl(c.why)}</div></div>` : ''}
          ${c.currentTheory ? `<div class="sec"><div class="sec-lbl">当前理论</div><div class="sec-txt">${nl(c.currentTheory)}</div></div>` : ''}
        `;

      case 'evolution':
        if (!c.evolution?.length) return empty('还没有演进历史');
        return c.evolution.map((item, i) => {
          const last = i === c.evolution.length - 1;
          return `
            <div class="tl-item">
              <div class="tl-left">
                <div class="tl-dot ${last ? 'cur' : ''}">${item.version}</div>
                ${!last ? '<div class="tl-spine"></div>' : ''}
              </div>
              <div class="tl-right">
                <div class="tl-title">${item.title}</div>
                <div class="tl-desc">${item.content}</div>
                ${item.problem      ? `<span class="tl-tag prob">问题：${item.problem}</span>` : ''}
                ${item.breakthrough ? `<span class="tl-tag win">突破：${item.breakthrough}</span>` : ''}
              </div>
            </div>`;
        }).join('');

      case 'rules':
        if (!c.rules?.length) return empty('暂无规则');
        return c.rules.map(r => `
          <div class="rule-item">
            <div class="rule-name">${r.name}</div>
            <div class="rule-body">${r.content}</div>
          </div>`).join('');

      case 'quotes':
        if (!c.quotes?.length) return empty('暂无金句');
        return c.quotes.map(q => `<div class="quote-item">${q}</div>`).join('');

      case 'agenda':
        if (!c.agenda?.length) return empty('暂无待研究问题');
        return c.agenda.map(a => `
          <div class="agenda-item"><div class="agenda-dot"></div>${a}</div>`).join('');

      case 'cases':
        if (!c.cases?.length) return empty('还没有案例，等待积累');
        return c.cases.map(x => `<div class="sec-txt">${nl(x)}</div>`).join('<hr style="border:none;border-top:1px solid var(--border);margin:16px 0">');

      case 'methods':
        if (!c.methods?.length) return empty('还没有方法，等待积累');
        return c.methods.map(x => `<div class="sec-txt">${nl(x)}</div>`).join('<hr style="border:none;border-top:1px solid var(--border);margin:16px 0">');

      default: return empty();
    }
  }

  init();
</script>
</body>
</html>
