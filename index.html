<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mental Garden</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #EDE8DF;
  --bg-lines: rgba(0,0,0,.025);
  --card: #FDFAF3;
  --card-shadow: 0 1px 2px rgba(0,0,0,.07), 0 4px 10px rgba(0,0,0,.08), 3px 6px 16px rgba(0,0,0,.05);
  --card-hover: 0 2px 4px rgba(0,0,0,.09), 0 8px 20px rgba(0,0,0,.11), 4px 10px 24px rgba(0,0,0,.07);
  --border: rgba(0,0,0,.07);
  --text: #1C1814;
  --text-muted: #7A7068;
  --text-faint: #B0A89E;
  --accent: #4A7C59;
  --accent-light: #EBF4EE;
  --film: #C4622D;
  --film-light: #FDF0E8;
  --ai-bg: #EEF2FA;
  --ai-text: #2D4A72;
  --ai-border: #4A6FA5;
  --tag-bg: #EDE8DF;
  --radius: 6px;
}

body {
  background-color: var(--bg);
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 27px, var(--bg-lines) 27px, var(--bg-lines) 28px);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", sans-serif;
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ── Header ── */
.header {
  background: rgba(237,232,223,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(0,0,0,.08);
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 14px;
  height: 52px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.2px;
  color: var(--text);
}
.logo em { color: var(--accent); font-style: normal; }

.search-wrap { flex: 1; max-width: 280px; position: relative; }
.search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--text-faint); font-size: 11px; pointer-events: none; }
.search-input {
  width: 100%; padding: 6px 10px 6px 27px;
  background: rgba(255,255,255,0.55); border: 1px solid rgba(0,0,0,.1);
  border-radius: 20px; font-size: 13px; color: var(--text); outline: none;
  transition: background 0.15s, border-color 0.15s;
}
.search-input::placeholder { color: var(--text-faint); }
.search-input:focus { background: rgba(255,255,255,.8); border-color: rgba(0,0,0,.18); }

.header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.node-count { font-size: 12px; color: var(--text-faint); }

.add-btn {
  display: flex; align-items: center; gap: 4px;
  padding: 6px 13px; background: var(--text); color: #FDFAF3;
  border: none; border-radius: 20px; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: opacity 0.15s;
}
.add-btn:hover { opacity: 0.8; }

/* ── Layout ── */
.layout { max-width: 960px; margin: 0 auto; padding: 28px 20px 80px; }

/* ── Radar ── */
.radar-row {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 28px; flex-wrap: wrap;
}
.radar-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.7px; white-space: nowrap; }
.radar-chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 12px; background: var(--film-light); border: 1px solid #EAC9B4;
  border-radius: 20px; font-size: 12px; color: var(--film); font-weight: 500;
  cursor: pointer; transition: background 0.15s; white-space: nowrap;
}
.radar-chip:hover { background: #FAE0CE; }

/* ── Section ── */
.section { margin-bottom: 28px; }
.section-head { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
.section-title { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.7px; }
.section-count { font-size: 11px; color: var(--text-faint); }

/* ── Card grid ── */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(196px, 1fr));
  gap: 14px;
}

/* ── Sticky note card ── */
.node-card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--card-shadow);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: box-shadow 0.18s, transform 0.18s;
  display: flex; flex-direction: column;
  padding: 14px 14px 12px;
  min-height: 160px;
  position: relative;
  overflow: hidden;
}
.node-card:hover {
  box-shadow: var(--card-hover);
  transform: translateY(-2px);
}

/* film accent strip */
.node-card.can-film::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--film);
  border-radius: var(--radius) var(--radius) 0 0;
}

/* theme tag line at top */
.card-theme {
  font-size: 10px; font-weight: 600; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.5px;
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 5px;
}
.card-theme-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent); flex-shrink: 0;
}

/* trigger text */
.card-trigger {
  font-size: 13px; line-height: 1.6; color: var(--text);
  flex: 1;
  display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical;
  overflow: hidden;
}

/* card footer */
.card-footer {
  margin-top: 12px; padding-top: 10px;
  border-top: 1px solid rgba(0,0,0,.06);
  display: flex; align-items: center; justify-content: space-between;
  gap: 6px;
}

/* completeness dots */
.completeness {
  display: flex; gap: 4px; align-items: center;
}
.c-dot {
  display: inline-flex; align-items: center; justify-content: center;
  width: 20px; height: 20px; border-radius: 50%;
  font-size: 9px; font-weight: 700; letter-spacing: 0;
  background: var(--tag-bg); color: var(--text-faint);
  border: 1px solid rgba(0,0,0,.07);
  transition: background 0.15s;
}
.c-dot.has {
  background: var(--accent-light); color: var(--accent);
  border-color: #C8E0D0;
}

/* right side badges */
.card-badges { display: flex; align-items: center; gap: 5px; }

.motif-pill {
  font-size: 10px; color: var(--text-faint);
  display: flex; align-items: center; gap: 3px;
}
.motif-pill.has-motif { color: var(--accent); }

.film-pill {
  font-size: 10px; font-weight: 600;
  color: var(--film); background: var(--film-light);
  padding: 2px 6px; border-radius: 10px;
  border: 1px solid #EAC9B4;
}

.card-date { font-size: 10px; color: var(--text-faint); }

/* ── Detail modal ── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(30,24,18,.45); backdrop-filter: blur(4px);
  z-index: 200; align-items: center; justify-content: center; padding: 20px;
}
.overlay.open { display: flex; }

.detail-panel {
  background: #FDFAF3; border-radius: 10px; width: 100%; max-width: 540px;
  max-height: 88vh; overflow-y: auto;
  box-shadow: 0 24px 64px rgba(0,0,0,.22);
  border: 1px solid rgba(0,0,0,.07);
}

.dp-head {
  padding: 20px 20px 0;
  display: flex; align-items: flex-start; gap: 12px;
}
.dp-meta { flex: 1; }

.dp-badges {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 8px;
}
.dp-theme {
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--accent); background: var(--accent-light);
  padding: 2px 7px; border-radius: 10px; border: 1px solid #C8E0D0;
}
.dp-motif {
  font-size: 10px; color: var(--text-muted); background: var(--tag-bg);
  padding: 2px 7px; border-radius: 10px;
}
.dp-film {
  font-size: 10px; font-weight: 600; color: var(--film); background: var(--film-light);
  padding: 2px 7px; border-radius: 10px; border: 1px solid #EAC9B4;
}

.dp-trigger {
  font-size: 15px; font-weight: 600; color: var(--text);
  line-height: 1.55; margin-bottom: 4px;
}
.dp-date { font-size: 11px; color: var(--text-faint); }

.dp-close {
  flex-shrink: 0; width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  background: var(--tag-bg); border: none; border-radius: 50%;
  cursor: pointer; font-size: 13px; color: var(--text-muted);
  margin-top: -2px;
}

.dp-body { padding: 16px 20px 20px; }

.dp-section { margin-bottom: 16px; }
.dp-section:last-child { margin-bottom: 0; }

.dp-label {
  font-size: 10px; font-weight: 700; color: var(--text-faint);
  text-transform: uppercase; letter-spacing: 0.6px;
  margin-bottom: 6px; display: flex; align-items: center; gap: 5px;
}

.dp-content { font-size: 13px; color: var(--text); line-height: 1.65; }
.dp-content.judgment { font-weight: 600; font-size: 14px; }

.dp-ai-note {
  margin-top: 8px; background: var(--ai-bg); border-left: 3px solid var(--ai-border);
  padding: 9px 11px; border-radius: 0 4px 4px 0; font-size: 12px; color: var(--ai-text);
  line-height: 1.6;
}
.dp-ai-tag {
  display: inline-block; font-size: 9px; font-weight: 700;
  background: #C8D9F0; color: var(--ai-border); border-radius: 3px;
  padding: 1px 4px; margin-right: 4px; letter-spacing: 0.2px;
  vertical-align: middle;
}

.dp-method-user {
  background: var(--accent-light); border-left: 3px solid var(--accent);
  padding: 9px 11px; border-radius: 0 4px 4px 0; font-size: 13px;
  margin-bottom: 6px;
}
.dp-method-ai {
  background: var(--ai-bg); border-left: 3px solid var(--ai-border);
  padding: 9px 11px; border-radius: 0 4px 4px 0; font-size: 12px; color: var(--ai-text);
  margin-top: 6px; line-height: 1.6;
}

.dp-completeness {
  display: flex; gap: 8px; align-items: center;
  padding: 10px 0; border-top: 1px solid rgba(0,0,0,.06); margin-top: 4px;
}
.dp-c-item {
  display: flex; align-items: center; gap: 4px;
  font-size: 11px; color: var(--text-faint);
}
.dp-c-item.has { color: var(--accent); }
.dp-c-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; opacity: 0.7; }

/* ── Add modal ── */
.add-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(30,24,18,.45); backdrop-filter: blur(4px);
  z-index: 300; align-items: center; justify-content: center; padding: 20px;
}
.add-overlay.open { display: flex; }

.add-panel {
  background: #FDFAF3; border-radius: 10px; width: 100%; max-width: 520px;
  max-height: 90vh; overflow-y: auto;
  box-shadow: 0 24px 64px rgba(0,0,0,.22); border: 1px solid rgba(0,0,0,.07);
}
.add-head { padding: 18px 20px 0; display: flex; align-items: center; justify-content: space-between; }
.add-title { font-size: 14px; font-weight: 600; }
.add-close {
  width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
  background: var(--tag-bg); border: none; border-radius: 50%;
  cursor: pointer; font-size: 13px; color: var(--text-muted);
}
.add-body { padding: 16px 20px; }
.field { margin-bottom: 14px; }
.field label {
  display: block; font-size: 10px; font-weight: 700; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px;
}
.field textarea, .field input {
  width: 100%; padding: 9px 11px; background: rgba(255,255,255,.65);
  border: 1px solid rgba(0,0,0,.1); border-radius: 5px;
  font-size: 13px; color: var(--text); font-family: inherit;
  resize: vertical; outline: none; line-height: 1.55; transition: border-color 0.15s;
}
.field textarea:focus, .field input:focus { border-color: rgba(0,0,0,.2); background: rgba(255,255,255,.9); }
.field textarea { min-height: 64px; }
.field-hint { font-size: 10px; color: var(--text-faint); margin-top: 3px; }
.add-footer { padding: 0 20px 18px; display: flex; gap: 8px; justify-content: flex-end; }
.btn-cancel {
  padding: 7px 14px; background: var(--tag-bg); border: none; border-radius: 20px;
  font-size: 13px; cursor: pointer; color: var(--text-muted);
}
.btn-save {
  padding: 7px 16px; background: var(--text); color: #FDFAF3; border: none;
  border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer;
}

/* ── Empty ── */
.empty {
  grid-column: 1/-1; text-align: center;
  padding: 48px 0; color: var(--text-faint); font-size: 13px;
}
.welcome {
  background: rgba(255,255,255,.4); border: 1px dashed rgba(0,0,0,.12);
  border-radius: var(--radius); padding: 40px 24px; text-align: center;
  grid-column: 1/-1;
}
.welcome h2 { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
.welcome p { color: var(--text-muted); font-size: 13px; line-height: 1.7; }
</style>
</head>
<body>

<header class="header">
  <div class="logo">Mental <em>Garden</em></div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="searchInput" placeholder="搜索…">
  </div>
  <div class="header-right">
    <span class="node-count" id="nodeCount"></span>
    <button class="add-btn" onclick="openAdd()">＋ 记录</button>
  </div>
</header>

<div class="layout" id="app">
  <div style="color:var(--text-faint);font-size:13px;">加载中…</div>
</div>

<!-- Detail overlay -->
<div class="overlay" id="detailOverlay" onclick="closeDetail(event)">
  <div class="detail-panel" id="detailPanel"></div>
</div>

<!-- Add overlay -->
<div class="add-overlay" id="addOverlay">
  <div class="add-panel">
    <div class="add-head">
      <div class="add-title">记录一个触动</div>
      <button class="add-close" onclick="closeAdd()">✕</button>
    </div>
    <div class="add-body">
      <div class="field">
        <label>触动 *</label>
        <textarea id="f-trigger" placeholder="让你停下来的那句话、那件事…" rows="3"></textarea>
      </div>
      <div class="field">
        <label>案例</label>
        <textarea id="f-case" placeholder="谁做了什么，发生了什么…"></textarea>
      </div>
      <div class="field">
        <label>判断</label>
        <textarea id="f-judgment" placeholder="你从中得出了什么结论？"></textarea>
      </div>
      <div class="field">
        <label>方法</label>
        <textarea id="f-method" placeholder="下次怎么用？"></textarea>
      </div>
      <div class="field">
        <label>主题</label>
        <input type="text" id="f-themes" placeholder="AI应用、老板演讲…">
        <div class="field-hint">逗号分隔</div>
      </div>
    </div>
    <div class="add-footer">
      <button class="btn-cancel" onclick="closeAdd()">取消</button>
      <button class="btn-save" onclick="saveNode()">存入</button>
    </div>
  </div>
</div>

<script>
let allNodes = [];
let searchQuery = '';

// theme → color mapping (consistent per theme name)
const THEME_COLORS = {};
const PALETTE = ['#4A7C59','#7C4A6B','#6B7C4A','#4A5E7C','#7C6B4A','#4A7C72','#7C4A4A'];
function themeColor(t) {
  if (!THEME_COLORS[t]) THEME_COLORS[t] = PALETTE[Object.keys(THEME_COLORS).length % PALETTE.length];
  return THEME_COLORS[t];
}

async function init() {
  try {
    const r = await fetch('data/nodes.json?t=' + Date.now());
    const d = await r.json();
    allNodes = d.nodes || [];
  } catch(e) { allNodes = []; }
  render();
}

function canFilm(n) { return n.judgment && (n.case || n.method || (n.method_ai && n.method_ai.length)); }
function has(n, f) { return !!(n[f] && n[f].trim()); }

function matchSearch(n, q) {
  if (!q) return true;
  const t = [n.trigger, n.case, n.judgment, n.method, ...(n.themes||[])].join(' ').toLowerCase();
  return q.toLowerCase().split(/\s+/).every(w => t.includes(w));
}

function render() {
  const app = document.getElementById('app');
  const q = searchQuery.trim();
  const nodes = allNodes.filter(n => matchSearch(n, q));
  document.getElementById('nodeCount').textContent = allNodes.length + ' 个';

  if (allNodes.length === 0) {
    app.innerHTML = `<div class="card-grid"><div class="welcome"><h2>🌱 花园还是空的</h2><p>点右上角「记录」，把今天让你停下来的瞬间存进来。</p></div></div>`;
    return;
  }

  let html = '';

  // radar
  const filmable = nodes.filter(canFilm);
  if (!q && filmable.length) {
    html += `<div class="radar-row"><span class="radar-label">🎬 可以拍</span>`;
    filmable.forEach(n => {
      html += `<span class="radar-chip" onclick="openDetailById('${n.id}')">${esc(short(n.trigger, 18))}</span>`;
    });
    html += `</div>`;
  }

  // group by theme
  const themeMap = {};
  nodes.forEach(n => {
    const themes = n.themes && n.themes.length ? n.themes : ['其他'];
    themes.forEach(t => {
      if (!themeMap[t]) themeMap[t] = [];
      themeMap[t].push(n);
    });
  });

  const rendered = new Set();
  Object.keys(themeMap).forEach(theme => {
    html += `<div class="section">
      <div class="section-head">
        <span class="section-title" style="color:${themeColor(theme)}">${esc(theme)}</span>
        <span class="section-count">${themeMap[theme].length}</span>
      </div>
      <div class="card-grid">`;
    themeMap[theme].forEach(n => {
      if (!rendered.has(n.id)) { html += cardHtml(n); rendered.add(n.id); }
    });
    html += `</div></div>`;
  });

  if (!q) {
    const unthemed = nodes.filter(n => !n.themes || !n.themes.length);
    if (unthemed.length) {
      html += `<div class="section"><div class="section-head"><span class="section-title">其他</span></div><div class="card-grid">`;
      unthemed.forEach(n => { if (!rendered.has(n.id)) { html += cardHtml(n); rendered.add(n.id); } });
      html += `</div></div>`;
    }
  }

  if (q && nodes.length === 0) html += `<div class="card-grid"><div class="empty">没有匹配的节点</div></div>`;

  app.innerHTML = html;
}

function cardHtml(n) {
  const film = canFilm(n);
  const hasJ = has(n,'judgment'), hasC = has(n,'case'), hasM = has(n,'method') || (n.method_ai && n.method_ai.length);
  const theme = n.themes && n.themes[0] ? n.themes[0] : '';
  const color = theme ? themeColor(theme) : 'var(--text-muted)';

  const dots = [
    {label:'判', has:hasJ}, {label:'案', has:hasC}, {label:'方', has:hasM}
  ].map(d => `<span class="c-dot${d.has?' has':''}" title="${d.label}">${d.label}</span>`).join('');

  const motif = n.motif
    ? `<span class="motif-pill has-motif">🌿 ${esc(short(n.motif,10))}</span>`
    : `<span class="motif-pill">— 独立</span>`;

  const filmPill = film ? `<span class="film-pill">🎬</span>` : '';

  return `<div class="node-card${film?' can-film':''}" id="node-${n.id}" onclick="openDetailById('${n.id}')">
    <div class="card-theme"><span class="card-theme-dot" style="background:${color}"></span>${esc(theme)}</div>
    <div class="card-trigger">${esc(n.trigger)}</div>
    <div class="card-footer">
      <div class="completeness">${dots}</div>
      <div class="card-badges">${motif}${filmPill}<span class="card-date">${(n.date||'').slice(5)}</span></div>
    </div>
  </div>`;
}

function openDetailById(id) {
  const n = allNodes.find(x => x.id === id);
  if (!n) return;

  const film = canFilm(n);
  const hasJ = has(n,'judgment'), hasC = has(n,'case'), hasM = has(n,'method');
  const hasCAI = !!(n.case_note && n.case_note.trim());
  const hasMAI = n.method_ai && n.method_ai.length;
  const theme = n.themes && n.themes[0] ? n.themes[0] : '';

  let body = '';

  // case
  if (hasC || hasCAI) {
    body += `<div class="dp-section"><div class="dp-label">📍 案例</div>`;
    if (hasC) body += `<div class="dp-content">${esc(n.case)}</div>`;
    if (hasCAI) body += `<div class="dp-ai-note"><span class="dp-ai-tag">AI 核实</span>${esc(n.case_note)}</div>`;
    body += `</div>`;
  }

  // judgment
  if (hasJ) {
    body += `<div class="dp-section"><div class="dp-label">💡 判断</div><div class="dp-content judgment">${esc(n.judgment)}</div></div>`;
  }

  // method
  if (hasM || hasMAI) {
    body += `<div class="dp-section"><div class="dp-label">🔧 方法</div>`;
    if (hasM) body += `<div class="dp-method-user">${esc(n.method)}</div>`;
    if (hasMAI) n.method_ai.forEach(m => {
      body += `<div class="dp-method-ai"><span class="dp-ai-tag">AI</span>${esc(m)}</div>`;
    });
    body += `</div>`;
  }

  // completeness footer
  body += `<div class="dp-completeness">
    <span class="dp-c-item${hasJ?' has':''}"><span class="dp-c-dot"></span>判断</span>
    <span class="dp-c-item${hasC?' has':''}"><span class="dp-c-dot"></span>案例</span>
    <span class="dp-c-item${(hasM||hasMAI)?' has':''}"><span class="dp-c-dot"></span>方法</span>
  </div>`;

  const themeBadge = theme ? `<span class="dp-theme">${esc(theme)}</span>` : '';
  const motifBadge = n.motif ? `<span class="dp-motif">🌿 ${esc(n.motif)}</span>` : '';
  const filmBadge = film ? `<span class="dp-film">🎬 可以拍</span>` : '';

  document.getElementById('detailPanel').innerHTML = `
    <div class="dp-head">
      <div class="dp-meta">
        <div class="dp-badges">${themeBadge}${motifBadge}${filmBadge}</div>
        <div class="dp-trigger">${esc(n.trigger)}</div>
        <div class="dp-date">${n.date || ''}</div>
      </div>
      <button class="dp-close" onclick="closeDetailBtn()">✕</button>
    </div>
    <div class="dp-body">${body}</div>`;

  document.getElementById('detailOverlay').classList.add('open');
}

function closeDetail(e) { if (e.target === document.getElementById('detailOverlay')) closeDetailBtn(); }
function closeDetailBtn() { document.getElementById('detailOverlay').classList.remove('open'); }

function openAdd() { document.getElementById('addOverlay').classList.add('open'); document.getElementById('f-trigger').focus(); }
function closeAdd() {
  document.getElementById('addOverlay').classList.remove('open');
  ['f-trigger','f-case','f-judgment','f-method','f-themes'].forEach(id => document.getElementById(id).value = '');
}

function saveNode() {
  const trigger = document.getElementById('f-trigger').value.trim();
  if (!trigger) { alert('触动是必填的'); return; }
  const themesRaw = document.getElementById('f-themes').value.trim();
  const themes = themesRaw ? themesRaw.split(/[,，]+/).map(t=>t.trim()).filter(Boolean) : [];
  const today = new Date().toISOString().slice(0,10);
  const node = {
    id: String(allNodes.length + 1).padStart(3,'0'), date: today,
    trigger,
    case: document.getElementById('f-case').value.trim(),
    judgment: document.getElementById('f-judgment').value.trim(),
    method: document.getElementById('f-method').value.trim(),
    method_ai: [], themes, ai_reviewed: false, updatedAt: today
  };
  allNodes.unshift(node); closeAdd(); render();
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify({nodes:allNodes},null,2)],{type:'application/json'}));
  a.download = 'nodes.json'; a.click();
  setTimeout(() => alert('nodes.json 已下载。替换 data/ 文件夹里的原文件，然后 git push。'), 200);
}

document.getElementById('searchInput').addEventListener('input', function(){ searchQuery=this.value; render(); });

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}
function short(s,n) { return s&&s.length>n?s.slice(0,n)+'…':(s||''); }

init();
</script>
</body>
</html>
